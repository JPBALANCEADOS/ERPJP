<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPBalanceados ERP</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  iframe { width:100%; height:100vh; border:none; display:block; }
</style>
</head>
<body>

<!--
  Este iframe arranca mostrando el LOGIN DE EMPRESA (CUIT + contraseña)
  del proyecto central. Reemplazá la URL de abajo por el /exec real de
  tu proyecto MANAGER (el que sirve CENTRAL_doGet.gs).
-->
<iframe
  id="iframe-principal"
  src="https://script.google.com/macros/s/AKfycbyDDyVLAvh3HbG9S4Ot_txcKS3Uj2qhdxxiITePNICvKH8HcsfgTxwUi-8iZUM3ltDqpw/exec"
  title="JPBalanceados ERP"
></iframe>

<script>
  // ─────────────────────────────────────────────────────────────────────
  // Escucha el aviso del login de empresa (que corre ADENTRO del iframe,
  // bajo el origen de Apps Script) y actualiza el src de este mismo
  // iframe con la URL real del proyecto del cliente — sin recargar esta
  // página y SIN que cambie la URL en la barra de direcciones del
  // navegador. El usuario nunca deja de estar, visualmente, en
  // jpbalanceados.com.
  // ─────────────────────────────────────────────────────────────────────

  window.addEventListener('message', function(event) {
    // ── Seguridad: origen del mensaje ──────────────────────────────────
    // Apps Script sirve el contenido HTML de un /exec desde un origen
    // interno de sandbox (algo como https://n-XXXXXXXX.googleusercontent.com),
    // no siempre exactamente "https://script.google.com". Por eso
    // aceptamos cualquier subdominio de googleusercontent.com además del
    // dominio directo — y como defensa adicional, más abajo validamos
    // también que la URL recibida sea realmente de script.google.com
    // antes de usarla.
    var origenValido =
      event.origin === 'https://script.google.com' ||
      /\.googleusercontent\.com$/.test(new URL(event.origin).hostname);

    if (!origenValido) return;
    if (!event.data || event.data.tipo !== 'ENTRAR_A_EMPRESA') return;

    var url = String(event.data.url || '');

    // ── Defensa en profundidad: solo aceptamos URLs de Apps Script ─────
    // Aunque el mensaje ya pasó el chequeo de origen, no confiamos en el
    // contenido a ciegas — si por lo que sea la URL no es un /exec real
    // de Apps Script, la ignoramos.
    if (url.indexOf('https://script.google.com/macros/s/') !== 0) return;

    document.getElementById('iframe-principal').src = url;
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPBalanceados ERP</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  iframe { width:100%; height:100vh; border:none; display:block; }

  #btn-cambiar-empresa {
    position:fixed; top:8px; right:8px; z-index:999;
    background:rgba(17,24,39,0.75); color:#fff; border:none; border-radius:20px;
    padding:6px 14px; font-family:system-ui,sans-serif; font-size:11px; cursor:pointer;
    display:none; align-items:center; gap:6px; backdrop-filter:blur(4px);
  }
  #btn-cambiar-empresa:hover { background:rgba(17,24,39,0.9); }
</style>
</head>
<body>

<!--
  Este iframe muestra, según el caso:
    - El LOGIN DE EMPRESA (CUIT + contraseña) del proyecto central, la
      primera vez que alguien entra desde ese navegador.
    - Directamente el sistema del cliente, si ya quedó "recordado" en
      este navegador de una vez anterior (ver localStorage más abajo).
-->
<iframe
  id="iframe-principal"
  src=""
  title="JPBalanceados ERP"
></iframe>

<button id="btn-cambiar-empresa" onclick="cambiarEmpresa()">
  <span id="txt-empresa-actual"></span> · Cambiar de empresa
</button>

<script>
  // URL del LOGIN DE EMPRESA del proyecto central — la puerta de entrada
  // pública. Reemplazar por el /exec real de tu proyecto MANAGER.
  var URL_LOGIN_EMPRESA = 'https://script.google.com/macros/s/TU_URL_DEL_PROYECTO_CENTRAL/exec';

  var CLAVE_LOCALSTORAGE = 'jpb_empresa_recordada';

  // ── Al cargar la página: ¿ya hay una empresa recordada en este navegador? ──
  // localStorage sobrevive a recargas, cierres de pestaña, y reinicios del
  // navegador — pero es exclusivo de ESTE dispositivo/navegador (nunca se
  // manda a ningún servidor). Guardamos solo la URL y el nombre — NUNCA
  // contraseñas ni tokens de sesión acá.
  // ── Al cargar la página: ¿ya hay una empresa recordada, y sigue siendo HOY? ──
  // localStorage sobrevive a recargas, cierres de pestaña, y reinicios del
  // navegador — pero es exclusivo de ESTE dispositivo/navegador (nunca se
  // manda a ningún servidor). Guardamos la URL, el nombre, Y la fecha
  // (calendario, no "24hs exactas") en que se guardó — si cambió el día,
  // se descarta y vuelve a pedir CUIT+contraseña, aunque hayan pasado
  // pocos minutos desde medianoche.
  function iniciar() {
    var guardado = leerEmpresaRecordada();
    if (guardado && guardado.url && guardado.fecha === fechaDeHoy()) {
      document.getElementById('iframe-principal').src = guardado.url;
      mostrarBotonCambiar(guardado.nombre);
    } else {
      try { localStorage.removeItem(CLAVE_LOCALSTORAGE); } catch (e) {} // vencido o inexistente — se limpia
      document.getElementById('iframe-principal').src = URL_LOGIN_EMPRESA;
    }
  }

  function fechaDeHoy() {
    // Fecha LOCAL del dispositivo, no UTC — "el día" es el día de quien
    // está usando el navegador, no el de un servidor en otro huso horario.
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function leerEmpresaRecordada() {
    try {
      var raw = localStorage.getItem(CLAVE_LOCALSTORAGE);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null; // localStorage puede fallar en algunos navegadores/modos — no rompemos por eso.
    }
  }

  function guardarEmpresaRecordada(url, nombre) {
    try {
      localStorage.setItem(CLAVE_LOCALSTORAGE, JSON.stringify({ url: url, nombre: nombre || '', fecha: fechaDeHoy() }));
    } catch (e) { /* si falla, no pasa nada grave — simplemente no se recuerda la próxima vez */ }
  }

  function mostrarBotonCambiar(nombre) {
    var btn = document.getElementById('btn-cambiar-empresa');
    document.getElementById('txt-empresa-actual').textContent = nombre || 'Conectado';
    btn.style.display = 'flex';
  }

  function cambiarEmpresa() {
    try { localStorage.removeItem(CLAVE_LOCALSTORAGE); } catch (e) {}
    document.getElementById('btn-cambiar-empresa').style.display = 'none';
    document.getElementById('iframe-principal').src = URL_LOGIN_EMPRESA;
  }

  // ── Escucha el aviso del login de empresa ──────────────────────────────
  // El login de empresa corre ADENTRO del iframe, bajo el origen de Apps
  // Script — nos avisa vía postMessage cuál es la URL real del cliente
  // (ver comentario largo en la versión anterior de este archivo sobre
  // por qué se usa postMessage y por qué el chequeo de origen es así).
  window.addEventListener('message', function(event) {
    var origenValido =
      event.origin === 'https://script.google.com' ||
      /\.googleusercontent\.com$/.test(new URL(event.origin).hostname);

    if (!origenValido) return;
    if (!event.data || event.data.tipo !== 'ENTRAR_A_EMPRESA') return;

    var url = String(event.data.url || '');
    if (url.indexOf('https://script.google.com/macros/s/') !== 0) return;

    var nombre = String(event.data.nombre || '');

    document.getElementById('iframe-principal').src = url;
    guardarEmpresaRecordada(url, nombre);
    mostrarBotonCambiar(nombre);
  });

  iniciar();
</script>
</body>
</html>
